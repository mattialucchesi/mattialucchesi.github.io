<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ IMPORTANT: mobile scaling fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Save the Date</title>

  <style>
    /* Your original base styling stays untouched */
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* Keep your layout as-is (example container if you have one) */
    .container {
      width: 600px; /* desktop stays the same */
      margin: 50px auto;
    }

    input, textarea, button {
      font-size: 14px;
    }

    /* ✅ ONLY MOBILE FIX — does NOT change desktop design */
    @media (max-width: 600px) {
      .container {
        width: 92%;
        margin: 20px auto;
      }

      input, textarea, button {
        width: 100%;
        font-size: 16px; /* fixes iPhone zoom issue */
        box-sizing: border-box;
      }

      label {
        display: block;
        margin-top: 10px;
      }
    }
  </style>

</head>

<body>

  <div class="container">

    <h1>Save the Date</h1>

    <form action="https://formspree.io/f/mzdyvrbv" method="POST">

      <label>Full Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Phone Number</label>
      <input type="tel" name="phone">

      <label>Reservation Date</label>
      <input type="date" name="date" required>

      <label>Preferred Time</label>
      <input type="time" name="time" required>

      <label>Message</label>
      <textarea name="message"></textarea>

      <input type="hidden" name="_subject" value="New Reservation Request">

      <button type="submit">Send</button>

    </form>

  </div>

</body>
</html>
