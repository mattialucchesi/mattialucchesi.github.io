<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ FIX MOBILE VIEWPORT (required) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Save the Date</title>

  <style>
    /* =========================
       YOUR ORIGINAL STYLES (UNCHANGED)
       ========================= */

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    /* If you already had layout styles, KEEP THEM AS THEY WERE */
    /* Example: do NOT force new widths or redesign */
    .container {
      /* keep your original value here */
      margin: 0 auto;
    }

    input, textarea, button {
      font-family: Arial, sans-serif;
    }

    /* =========================
       ONLY MOBILE FIX (SAFE PATCH)
       ========================= */
    @media (max-width: 600px) {

      /* prevent horizontal overflow on phones */
      body {
        overflow-x: hidden;
      }

      /* ensure container fits screen but does NOT change design */
      .container {
        max-width: 100%;
        padding-left: 10px;
        padding-right: 10px;
      }

      /* fix input scaling issue on iPhone (important) */
      input, textarea, button {
        font-size: 16px;
      }
    }

  </style>
</head>

<body>


  <div class="container">

    <h1>Save the Date</h1>

    <form action="https://formspree.io/f/mzdyvrbv" method="POST">

      <label>Full Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Phone Number</label>
      <input type="tel" name="phone">

      <label>Reservation Date</label>
      <input type="date" name="date" required>

      <label>Preferred Time</label>
      <input type="time" name="time" required>

      <label>Message</label>
      <textarea name="message"></textarea>

      <input type="hidden" name="_subject" value="New Reservation Request">

      <button type="submit">Send</button>

    </form>

  </div>

</body>
</html>
