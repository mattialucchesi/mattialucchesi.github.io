<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ Mobile fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Book Your Spot</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    .container {
      width: 92%;
      max-width: 600px;
      margin: 25px auto;
      background: white;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 18px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      margin-top: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #000;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      margin-top: 10px;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .container {
        margin: 15px auto;
        padding: 18px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Book Your Reservation</h1>
    <p>Please fill out the form below and we’ll get back to you.</p>

    <form action="https://formspree.io/f/mzdyvrbv" method="POST">

      <label>Full Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Phone Number</label>
      <input type="tel" name="phone">

      <label>Reservation Date</label>
      <input type="date" name="date" required>

      <label>Preferred Time</label>
      <input type="time" name="time" required>

      <label>Additional Notes</label>
      <textarea name="message"></textarea>

      <input type="hidden" name="_subject" value="New Reservation Request">

      <button type="submit">Send Reservation</button>

    </form>

  </div>

</body>
</html>
