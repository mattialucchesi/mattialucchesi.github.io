<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ FIX MOBILE DISPLAY -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Save the Date</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .container {
      width: 90%;
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 28px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-top: 10px;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px; /* important for mobile zoom fix */
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    button {
      margin-top: 20px;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      .container {
        margin: 20px auto;
        padding: 20px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>

</head>

<body>

  <div class="container">

    <h1>Save the Date</h1>

    <form action="https://formspree.io/f/mzdyvrbv" method="POST">

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">

      <label for="date">Reservation Date</label>
      <input type="date" id="date" name="date" required>

      <label for="time">Preferred Time</label>
      <input type="time" id="time" name="time" required>

      <label for="message">Notes</label>
      <textarea id="message" name="message" rows="4"></textarea>

      <input type="hidden" name="_subject" value="New Reservation Request">

      <button type="submit">Send</button>

    </form>

  </div>

</body>
</html>
